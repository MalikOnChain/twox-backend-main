# Local parity: npm ci && npm run ci  (and npm run ci:integration with Mongo on 27017)
# GitHub → Settings → Branches → Add rule for `main`: require this workflow to pass before merge.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-backend-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Install, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (no lifecycle scripts)
        run: rm -rf node_modules && npm install --ignore-scripts --no-audit --no-fund

      - name: Prune ethers src for tsc (same as postinstall)
        run: node scripts/prune-ethers-src.mjs

      - name: Verify (typecheck + build)
        run: npm run ci

  # Boots the real API against MongoDB and hits public HTTP routes (closer to production than tsc alone).
  integration:
    name: API + Mongo smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (no lifecycle scripts)
        run: rm -rf node_modules && npm install --ignore-scripts --no-audit --no-fund

      - name: Prune ethers src for runtime imports (same as postinstall)
        run: node scripts/prune-ethers-src.mjs

      - name: "API + Mongo smoke (local parity — npm run ci:integration)"
        env:
          NODE_ENV: development
          PORT: 5000
          MONGO_URI: mongodb://127.0.0.1:27017/twox_ci
          BACKEND_URL: http://127.0.0.1:5000
          FRONTEND_URL: http://127.0.0.1:3000
          ADMIN_PANEL_FRONTEND_URL: http://127.0.0.1:9000
          JWT_SECRET: ci_jwt_secret_must_be_at_least_forty_five_characters_long
          SHARED_SECRET: ci_shared_secret_minimum_length_ok
          SENDGRID_API_KEY: dummy_sendgrid_key_for_ci
          GOOGLE_OAUTH_CLIENT_ID: dummy-google-oauth-client-id
          GOOGLE_OAUTH_CLIENT_SECRET: dummy-google-oauth-client-secret
          RECAPTCHA_SECRET_KEY: dummy-recaptcha-secret
          ADMIN_SECRET: ci_admin_secret_at_least_32_chars_long_ok
          PRICE_SOCKET_SERVICE_DISABLE: '1'
          CHAT_SOCKET_SERVICE_DISABLE: '1'
          USER_SOCKET_SERVICE_DISABLE: '1'
          BET_HISTORY_SOCKET_SERVICE_DISABLE: '1'
          NOTIFICATION_SOCKET_SERVICE_DISABLE: '1'
          STATUS_SOCKET_SERVICE_DISABLE: '1'
          TRIVIA_SOCKET_SERVICE_DISABLE: '1'
          TRANSACTION_SOCKET_SERVICE_DISABLE: '1'
        run: npm run ci:integration
