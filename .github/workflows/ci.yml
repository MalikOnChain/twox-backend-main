# Local parity: npm ci && npm run verify
# GitHub → Settings → Branches → Add rule for `main`: require this workflow to pass before merge.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-backend-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Install, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (no lifecycle scripts)
        run: rm -rf node_modules && npm install --ignore-scripts --no-audit --no-fund

      - name: Prune ethers src for tsc (same as postinstall)
        run: node scripts/prune-ethers-src.mjs

      - name: Typecheck
        run: npm run type-check

      - name: Build (tsc → dist)
        run: npm run build
